name: Coeziv Global Refresh

on:
  workflow_dispatch:
  schedule:
    # Daily after most global market data has settled.
    - cron: "35 8 * * *"
  push:
    paths:
      - "scripts/update_global_coeziv_state.py"
      - "scripts/build_global_coeziv_state.py"
      - ".github/workflows/coeziv-global-refresh.yml"

permissions:
  contents: write

concurrency:
  group: coeziv-global-refresh
  cancel-in-progress: false

jobs:
  refresh-global-state:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance

      - name: Download global market series
        run: python scripts/update_global_coeziv_state.py

      - name: Build global coeziv state
        run: python scripts/build_global_coeziv_state.py

      - name: Guard against empty or invalid JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/global_coeziv_state.json")
          if not path.exists():
              raise SystemExit("data/global_coeziv_state.json does not exist")

          text = path.read_text(encoding="utf-8").strip()
          if len(text) < 200:
              raise SystemExit("Refusing to publish global_coeziv_state.json: file is empty or too short")

          data = json.loads(text)
          latest = data.get("latest")
          series = data.get("series")

          if not isinstance(latest, dict) or not latest.get("date"):
              raise SystemExit("Invalid global_coeziv_state.json: missing latest.date")

          if not isinstance(series, list) or len(series) < 260:
              raise SystemExit(f"Invalid global_coeziv_state.json: series too short ({len(series) if isinstance(series, list) else 'N/A'})")

          for key in ("ic_global", "icd_global", "risk_score"):
              if latest.get(key) is None:
                  raise SystemExit(f"Invalid global_coeziv_state.json: missing latest.{key}")

          print("JSON guard OK:", latest["date"], "points=", len(series))
          PY

      - name: Commit refreshed global state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data_global/*.csv data/global_coeziv_state.json

          if git diff --cached --quiet; then
            echo "No global coeziv changes to commit."
            exit 0
          fi

          git commit -m "Update coeziv global state"
          git push
