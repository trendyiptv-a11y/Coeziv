name: Apply Present Reality Gate Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-present-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run present gate patch
        run: node scripts/patch-present-gate.js
      - name: Run present value rectification
        run: node scripts/rectify-present-value.js
      - name: Show diff
        run: git diff -- api/analyze.js
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- api/analyze.js; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add api/analyze.js
          git commit -m "Apply universal present reality gate"
          git push
