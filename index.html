  <style>
    :root { --true:#00ffb7; --false:#ff3b3b; --neutral:#ffc800; --bg:#0d1117; --panel:#161b22; --text:#c9d1d9; --muted:#9ba1a6; --human:#ffda47; }
    * { box-sizing:border-box; }
    body { background-color:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; text-align:center; padding:2rem 1rem; margin:0; }
    h1 { color:var(--true); font-size:2rem; margin-bottom:0.3rem; }
    h2 { color:var(--muted); font-weight:normal; margin:0 auto 1rem; max-width:900px; line-height:1.45; font-size:1.05rem; }
    textarea { width:90%; max-width:600px; height:120px; border-radius:10px; border:1px solid #222; background-color:var(--panel); color:var(--text); padding:0.8rem; font-size:1rem; resize:vertical; outline:none; }
    textarea:focus { border-color:var(--true); box-shadow:0 0 10px rgba(0,255,183,0.15); }
    button { border:none; border-radius:10px; color:#000; font-weight:bold; padding:0.8rem 1.6rem; font-size:1rem; cursor:pointer; margin-top:1rem; transition:background-color 0.25s,transform 0.2s,box-shadow 0.2s; }
    button:hover { transform:translateY(-1px); }
    #analyzeBtn { background-color:var(--true); }
    #analyzeBtn:hover { background-color:#00d0a0; box-shadow:0 0 14px rgba(0,255,183,0.22); }
    #humanBtn { background-color:var(--human); margin-left:0.5rem; }
    #humanBtn:hover { background-color:#ffe16b; box-shadow:0 0 14px rgba(255,218,71,0.22); }
    .result-box { background-color:var(--panel); border-radius:14px; padding:1.4rem; margin:1.6rem auto; width:90%; max-width:650px; text-align:left; box-shadow:0 0 14px rgba(0,255,183,0.1); }
    .score-bar { height:6px; border-radius:3px; background-color:#333; overflow:hidden; margin-top:6px; }
    .score-bar-inner { height:6px; transition:width 0.4s ease; border-radius:3px; }
    a.source-link { display:block; text-decoration:none; color:#1e90ff; margin-top:6px; overflow-wrap:anywhere; }
    a.source-link:hover { text-decoration:underline; }
    .collections-btn { display:inline-block; margin-left:0.6rem; padding:0.6rem 1.2rem; color:#0d1117; background:var(--human); border:1px solid var(--human); border-radius:8px; text-decoration:none; font-size:0.9rem; font-weight:bold; cursor:pointer; transition:0.2s; }
    .collections-btn:hover { background:#ffe16b; transform:translateY(-1px); box-shadow:0 0 14px rgba(255,218,71,0.22); }
    .about-link { display:inline-block; padding:0.6rem 1.2rem; color:#00ffb7; border:1px solid #00ffb7; border-radius:8px; text-decoration:none; font-size:0.9rem; transition:0.2s; }
    .about-link:hover { background:rgba(0,255,183,0.08); box-shadow:0 0 14px rgba(0,255,183,0.16); transform:translateY(-1px); }

<body>
  <h1>Analizor Coeziv 3.14</h1>
  <h2>Sistem inteligent de interpretare semantică și coerență informațională, bazat pe Modelul Coeziv 3.14 – o punte între știință, limbaj și vibrație.</h2>

  <textarea id="inputText" placeholder="Scrie o afirmație..."></textarea><br>
  <button id="analyzeBtn" onclick="analyze()">🔬 Analizează afirmația</button>
  <button id="humanBtn" onclick="analyzeHuman()">🌿 Analizează prin ΔH (uman)</button>

  <div id="result" class="result-box" style="display:none;"></div>

  <div style="text-align:center; margin-top:2.5rem;">
    <a href="/document/index.html" class="about-link">Despre Modelul Coeziv</a>
    <button onclick="window.location.href='/document/collections.html'" class="collections-btn">🔭 Colecții Coezive</button>
    <p class="footer-note">Proiect realizat cu <strong>Modelul Coeziv – Formula Coeziunii</strong>.</p>
  </div>

  <script>
    async function analyze() {
      const text = document.getElementById("inputText").value.trim();
      const resultBox = document.getElementById("result");
      if (!text) return alert("Introdu o propoziție pentru analiză.");
      resultBox.style.display = "block";
      resultBox.innerHTML = "⏳ Se analizează...";
      try {
        const response = await fetch("/api/analyze", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ text }) });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || "Răspuns invalid de la server.");
        renderResult(data, false, text);
      } catch (err) {
        resultBox.innerHTML = `<p style="color: var(--false)">Eroare: ${escapeHTML(err.message)}</p>`;
      }
    }

    async function analyzeHuman() {
      const text = document.getElementById("inputText").value.trim();
      const resultBox = document.getElementById("result");
      if (!text) return alert("Introdu o propoziție pentru analiză.");
      resultBox.style.display = "block";
      resultBox.innerHTML = "🌿 Se analizează prin ΔH (uman)...";
      try {
        const response = await fetch("/api/analyze", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ text, humanMode:true }) });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || "Răspuns invalid de la server.");
        renderResult(data, true, text);
      } catch (err) {
        resultBox.innerHTML = `<p style="color: var(--false)">Eroare: ${escapeHTML(err.message)}</p>`;
      }
    }

    function renderResult(data, humanMode = false, text = "") {
      const resultBox = document.getElementById("result");
      const F = safeNumber(data.factual_score);
      const L = safeNumber(data.logic_score);
      const C = safeNumber(data.semantic_score);
      const H = humanMode ? safeNumber(data.human_score ?? calcHumanResonance(text)) : 0;
      const VNumber = safeNumber(data.V) || (humanMode ? (F + L + C + H) / 4 : (F + L + C) / 3);
      const V = VNumber.toFixed(2);
      const verdict = data.verdict || (humanMode ? (H > 2.5 ? "🌿 Adevăr coeziv uman" : "⚖️ Echilibru parțial uman") : "Analiză incompletă");
      const summary = data.summary || "Analiza completă conform Formulei 3.14Δ.";
      const barWidth = Math.max(0, Math.min((VNumber / 3.14) * 100, 100));
      const color = humanMode ? "var(--human)" : "var(--true)";
      const sourcesHTML = Array.isArray(data.sources) && data.sources.length
        ? data.sources.map(source => {
            const title = escapeHTML(source.title || "Sursă");
            const link = sanitizeURL(source.link || "#");
            return `<a class="source-link" href="${link}" target="_blank" rel="noopener noreferrer">🌐 ${title}</a>`;
          }).join("")
        : `<p style="color: var(--muted)">Nicio sursă relevantă.</p>`;
      resultBox.innerHTML = `
        <p><b>Formula ${humanMode ? "3.14ΔH" : "3.14Δ"}:</b> F=${F.toFixed(2)}, L=${L.toFixed(2)}, C=${C.toFixed(2)}${humanMode ? `, H=${H.toFixed(2)}` : ""}</p>
        <p><b>Verdict:</b> ${escapeHTML(verdict)}</p>
        <p><b>Scor total V:</b> ${V} / 3.14</p>
        <div class="score-bar"><div class="score-bar-inner" style="width:${barWidth}%; background-color:${color};"></div></div>
        <p style="margin-top:1rem;">${escapeHTML(summary)}</p>
        <h4 style="margin-top:1rem;">🔗 Surse:</h4>
        ${sourcesHTML}`;
    }

    function calcHumanResonance(text) {
      const keywords = ["suflet", "iubire", "armonie", "adevăr", "lumina", "lumină", "viață", "viata", "coeziune", "energie"];
      let resonance = 0;
      const lowerText = String(text || "").toLowerCase();
      for (const word of keywords) if (lowerText.includes(word)) resonance += 0.5;
      if (!lowerText.match(/\b(nu|rău|rau|fals|ură|ura|greșit|gresit)\b/gi)) resonance += 0.5;
      return Math.min(resonance, 3.14);
    }

    function safeNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? Math.max(0, Math.min(number, 3.14)) : 0;
    }

    function escapeHTML(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function sanitizeURL(value) {
      const raw = String(value || "").trim();
      try {
        const url = new URL(raw, window.location.origin);
        if (url.protocol === "http:" || url.protocol === "https:") return escapeHTML(url.href);
        return "#";
      } catch { return "#"; }
    }
  </script>
</body>
