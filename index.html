<!DOCTYPE html><html lang="ro"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Analizor Coeziv</title><meta name="description" content="Analizor Coeziv 3.14 pentru interpretare factuală, logică, semantică și umană."><meta name="author" content="Sergiu Bulboacă"><link rel="manifest" href="/manifest.json"><style>:root{--true:#00ffb7;--false:#ff3b3b;--bg:#0d1117;--panel:#161b22;--text:#c9d1d9;--muted:#9ba1a6;--human:#ffda47}*{box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:Segoe UI,sans-serif;text-align:center;padding:2rem 1rem;margin:0}h1{color:var(--true);font-size:2rem;margin-bottom:.3rem}h2{color:var(--muted);font-weight:400;margin:0 auto 1rem;max-width:900px;line-height:1.45;font-size:1.05rem}textarea{width:90%;max-width:600px;height:120px;border-radius:10px;border:1px solid #222;background:var(--panel);color:var(--text);padding:.8rem;font-size:1rem;resize:vertical;outline:none}button{border:0;border-radius:10px;color:#000;font-weight:700;padding:.8rem 1.6rem;font-size:1rem;cursor:pointer;margin-top:1rem}#analyzeBtn{background:var(--true)}#humanBtn{background:var(--human);margin-left:.5rem}.result-box{background:var(--panel);border-radius:14px;padding:1.4rem;margin:1.6rem auto;width:90%;max-width:650px;text-align:left;box-shadow:0 0 14px rgba(0,255,183,.1)}.score-bar{height:6px;border-radius:3px;background:#333;overflow:hidden;margin-top:6px}.score-bar-inner{height:6px;border-radius:3px}a.source-link{display:block;text-decoration:none;color:#1e90ff;margin-top:6px;overflow-wrap:anywhere}.note{color:var(--muted);font-size:.9rem;line-height:1.35;margin-top:.35rem}.refinement{margin-top:1rem;padding:1rem;border-left:4px solid var(--true);background:linear-gradient(135deg,rgba(0,255,183,.07),rgba(0,255,183,.025));border-radius:12px;line-height:1.45}.refinement-title{font-weight:800;font-size:1.05rem;margin-bottom:.75rem}.refinement-layer{padding:.62rem .72rem;margin:.55rem 0;border-radius:10px;background:rgba(13,17,23,.38);border:1px solid rgba(255,255,255,.06)}.refinement-label{display:block;color:var(--true);font-weight:800;margin-bottom:.25rem}.source-card{margin-top:.65rem;padding:.75rem;border-radius:10px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06)}.source-meta{color:var(--muted);font-size:.78rem;margin-top:.15rem}.public-presence{margin-top:1rem;padding-top:.4rem;border-top:1px solid rgba(255,255,255,.08)}.about-link{display:inline-block;padding:.6rem 1.2rem;color:#00ffb7;border:1px solid #00ffb7;border-radius:8px;text-decoration:none}.collections-btn{display:inline-block;margin-left:.6rem;padding:.6rem 1.2rem;color:#0d1117;background:var(--human);border-radius:8px;text-decoration:none;font-weight:700}.footer-note{color:#aaa;font-size:.8rem;margin-top:.5rem}@media(max-width:640px){body{padding:1.5rem .8rem}h1{font-size:1.6rem}h2{font-size:.95rem}#humanBtn{margin-left:0}button,.about-link,.collections-btn{width:90%;max-width:320px;margin-left:0}.collections-btn{margin-top:.7rem}}</style></head><body><h1>Analizor Coeziv 3.14</h1><h2>Sistem inteligent de interpretare semantică și coerență informațională, bazat pe Modelul Coeziv 3.14 – o punte între știință, limbaj și vibrație.</h2><textarea id="inputText" placeholder="Scrie o afirmație..."></textarea><br><button id="analyzeBtn" onclick="analyze()">🔬 Analizează afirmația</button><button id="humanBtn" onclick="analyzeHuman()">🌿 Analizează prin ΔH (uman)</button><div id="result" class="result-box" style="display:none"></div><div style="text-align:center;margin-top:2.5rem"><a href="/document/index.html" class="about-link">Despre Modelul Coeziv</a><button onclick="location.href='/document/collections.html'" class="collections-btn">🔭 Colecții Coezive</button><p class="footer-note">Proiect realizat cu <strong>Modelul Coeziv – Formula Coeziunii</strong>.</p></div><script>async function analyze(){await runAnalyze(false)}async function analyzeHuman(){await runAnalyze(true)}async function runAnalyze(humanMode){const text=document.getElementById('inputText').value.trim(),box=document.getElementById('result');if(!text)return alert('Introdu o propoziție pentru analiză.');box.style.display='block';box.innerHTML=humanMode?'🌿 Se analizează prin ΔH (uman)...':'⏳ Se analizează...';try{const response=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(humanMode?{text,humanMode:true}:{text})});const data=await response.json().catch(()=>({}));if(!response.ok||data.error)throw new Error(buildErr(data,response.status));renderResult(data,humanMode,text)}catch(err){box.innerHTML='<p style="color:var(--false)"><b>Eroare:</b> '+esc(err.message.split('\n')[0])+'</p><div class="note">'+esc(err.message.split('\n').slice(1).join('\n'))+'</div>'}}function buildErr(data,status){const a=[data.error||'Răspuns invalid de la server.'];if(data.status||status)a.push('Status: '+(data.status||status));if(data.model)a.push('Model: '+data.model);if(data.endpoint)a.push('Endpoint: '+data.endpoint);if(data.detail)a.push('Detaliu: '+data.detail);return a.join('\n')}function renderResult(data,humanMode,text){const box=document.getElementById('result'),F=num(data.factual_score),L=num(data.logic_score),C=num(data.semantic_score),H=humanMode?num(data.human_score):0,Vn=num(data.V)||(humanMode?(F+L+C+H)/4:(F+L+C)/3),V=Vn.toFixed(2),bar=Math.max(0,Math.min((Vn/3.14)*100,100)),color=humanMode?'var(--human)':'var(--true)',verdict=data.verdict||'Analiză incompletă',summary=data.summary||'Analiza completă conform Formulei 3.14Δ.';const strong=Array.isArray(data.sources)&&data.sources.length?data.sources.map(s=>srcHTML(s,true,'✅')).join(''):'<p class="note">'+esc(data.source_note||'Nicio sursă de susținere puternică suficient de relevantă.')+'</p>';const limits=Array.isArray(data.contradiction_sources)&&data.contradiction_sources.length?'<h4 style="margin-top:1rem">⚠️ Surse limitative:</h4><p class="note">Acestea sunt relevante, dar limitează sau nu confirmă formularea completă.</p>'+data.contradiction_sources.map(s=>srcHTML(s,false,'⚠️')).join(''):'';const context=Array.isArray(data.context_sources)&&data.context_sources.length?'<h4 style="margin-top:1rem">📚 Surse de context:</h4><p class="note">Acestea oferă fundal, dar nu confirmă decisiv afirmația.</p>'+data.context_sources.map(s=>srcHTML(s,false,'🌐')).join(''):'';const refine=data.objective_refinement?formatRefinement(data.objective_refinement):'';const own=Array.isArray(data.public_presence)&&data.public_presence.length?'<div class="public-presence"><h4>🌐 Prezență publică proprie:</h4><p class="note">'+esc(data.public_presence_note||'Aceste linkuri descriu prezența publică a proiectului, dar nu sunt validare independentă.')+'</p>'+data.public_presence.map(s=>srcHTML(s,false,'🌐')).join('')+'</div>':'';box.innerHTML='<p><b>Formula '+(humanMode?'3.14ΔH':'3.14Δ')+':</b> F='+F.toFixed(2)+', L='+L.toFixed(2)+', C='+C.toFixed(2)+(humanMode?', H='+H.toFixed(2):'')+'</p><p><b>Verdict:</b> '+esc(verdict)+'</p><p><b>Scor total V:</b> '+V+' / 3.14</p><div class="score-bar"><div class="score-bar-inner" style="width:'+bar+'%;background-color:'+color+'"></div></div><p style="margin-top:1rem">'+esc(summary)+'</p>'+refine+'<h4 style="margin-top:1rem">✅ Surse de susținere:</h4>'+strong+limits+context+own}function formatRefinement(text){const labels=['Cohesion Core 3.14','Știință','Stiinta','Limbaj','Vibrație/coerență','Vibratie/coerenta','Observație semantică','Observatie semantica','Limită obiectivă','Limita obiectiva','Notă surse','Notă','Nota'];let raw=String(text||'');for(const label of labels)raw=raw.replaceAll(label+':','|||'+label+':');const chunks=raw.split('|||').map(s=>s.trim()).filter(Boolean);let html='<div class="refinement"><div class="refinement-title">🧭 Rafinare obiectivă</div>';for(const chunk of chunks){const p=chunk.indexOf(':');if(p>0){html+='<div class="refinement-layer"><span class="refinement-label">'+esc(chunk.slice(0,p))+'</span><span>'+esc(chunk.slice(p+1).trim())+'</span></div>'}else html+='<div class="refinement-layer"><span>'+esc(chunk)+'</span></div>'}return html+'</div>'}function srcHTML(s,strong,icon){const meta=[s.role?s.role:null,s.authority_score?'autoritate '+s.authority_score+'/5':null].filter(Boolean).join(' · ');return '<div class="source-card"><a class="source-link" href="'+safeURL(s.link||'#')+'" target="_blank" rel="noopener noreferrer">'+(icon||'🌐')+' '+esc(s.title||'Sursă')+'</a>'+(meta?'<div class="source-meta">'+esc(meta)+'</div>':'')+'</div>'}function num(v){v=Number(v);return Number.isFinite(v)?Math.max(0,Math.min(v,3.14)):0}function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function safeURL(v){try{const u=new URL(String(v||'').trim(),location.origin);return u.protocol==='http:'||u.protocol==='https:'?esc(u.href):'#'}catch{return'#'}}</script></body></html>
