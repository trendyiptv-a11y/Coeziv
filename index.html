<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modelul Coeziv 3.14</title>
  <meta name="description" content="Modelul Coeziv 3.14 – acces rapid la documentație și colecții." />
  <meta name="author" content="Sergiu Bulboacă" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      --bg: #0d1117;
      --panel: rgba(22, 27, 34, .74);
      --text: #c9d1d9;
      --emerald: #00ffb7;
      --gold: #ffda47;
      --line: rgba(255, 255, 255, .10);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      color: var(--text);
      font-family: Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(0, 255, 183, .18), transparent 26rem),
        radial-gradient(circle at 80% 85%, rgba(255, 218, 71, .14), transparent 24rem),
        linear-gradient(145deg, #0d1117 0%, #070a0f 100%);
    }

    nav {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(1rem, 4vw, 1.5rem);
    }

    a {
      position: relative;
      min-height: clamp(170px, 30vw, 230px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: .7rem;
      overflow: hidden;
      border-radius: 28px;
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 22px 70px rgba(0, 0, 0, .34);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }

    a::before {
      content: "";
      position: absolute;
      inset: -40%;
      opacity: .18;
      background: radial-gradient(circle, currentColor, transparent 58%);
      transform: scale(.75);
      transition: transform .22s ease, opacity .22s ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-5px);
      outline: none;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .46);
    }

    a:hover::before,
    a:focus-visible::before {
      opacity: .28;
      transform: scale(1);
    }

    .document {
      color: var(--emerald);
      border-color: rgba(0, 255, 183, .32);
    }

    .collections {
      color: var(--gold);
      border-color: rgba(255, 218, 71, .32);
    }

    .icon {
      position: relative;
      z-index: 1;
      font-size: clamp(2.2rem, 8vw, 4rem);
      line-height: 1;
      filter: drop-shadow(0 0 18px currentColor);
    }

    .label {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: clamp(1.05rem, 3vw, 1.45rem);
      font-weight: 900;
      letter-spacing: .02em;
    }

    @media (max-width: 640px) {
      nav { grid-template-columns: 1fr; }
      a { min-height: 155px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <nav aria-label="Navigare principală">
    <a class="document" href="/document/index.html" aria-label="Despre Modelul Coeziv">
      <span class="icon">∴</span>
      <span class="label">Despre Modelul Coeziv</span>
    </a>

    <a class="collections" href="/document/collections.html" aria-label="Colecții Coezive">
      <span class="icon">🔭</span>
      <span class="label">Colecții Coezive</span>
    </a>
  </nav>
</body>
</html>
