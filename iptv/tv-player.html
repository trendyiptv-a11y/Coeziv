<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Coeziv TV Player</title>
  <style>
    :root{
      --bg:#071120;
      --panel:#0f172a;
      --line:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:#9fb0c7;
      --blue:#2563eb;
      --blue-2:#1d4ed8;
      --green:#16a34a;
      --gray:#374151;
      --focus:#facc15;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg,#071120,#0b1020 35%,#0f172a 100%);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      padding:18px;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
    }

    .topbar{
      background:rgba(15,23,42,.92);
      border:1px solid var(--line);
      border-radius:22px;
      padding:20px;
      margin-bottom:18px;
    }

    .title{
      margin:0 0 8px;
      font-size:34px;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }

    .search{
      width:100%;
      margin-top:16px;
      min-height:62px;
      border-radius:16px;
      border:2px solid #314257;
      background:#0a1324;
      color:#fff;
      padding:14px 18px;
      font-size:24px;
      outline:none;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      min-height:60px;
      min-width:220px;
      border:none;
      border-radius:14px;
      padding:14px 20px;
      color:#fff;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-blue{ background:linear-gradient(135deg,var(--blue),var(--blue-2)); }
    .btn-green{ background:linear-gradient(135deg,var(--green),#15803d); }
    .btn-gray{ background:var(--gray); }

    button:focus,
    .search:focus,
    .channel-btn:focus{
      outline:4px solid var(--focus);
      outline-offset:3px;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      font-size:18px;
      line-height:1.5;
      background:rgba(245,158,11,.12);
      border:1px solid rgba(245,158,11,.25);
      color:#fde68a;
    }

    .message.ok{
      background:rgba(22,163,74,.12);
      border-color:rgba(22,163,74,.25);
      color:#bbf7d0;
    }

    .message.err{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.25);
      color:#fecaca;
    }

    .badges{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .badge{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#eef2f7;
      font-size:16px;
    }

    .list{
      margin-top:18px;
      background:rgba(15,23,42,.92);
      border:1px solid var(--line);
      border-radius:22px;
      padding:10px 20px;
    }

    .channel-row{
      padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .channel-row:last-child{
      border-bottom:none;
    }

    .channel-btn{
      width:100%;
      text-align:left;
      min-width:0;
      min-height:74px;
      border-radius:16px;
      background:#101b2f;
      border:1px solid rgba(255,255,255,.08);
      font-size:28px;
      font-weight:700;
      padding:16px 18px;
    }

    .meta{
      display:block;
      margin-top:6px;
      font-size:16px;
      font-weight:400;
      color:#9fb0c7;
    }

    @media (max-width: 820px){
      body{ padding:12px; }
      .topbar,.list{ border-radius:18px; }
      .title{ font-size:28px; }
      .subtitle,.badge,.meta,.message{ font-size:15px; }
      .search{ font-size:20px; min-height:56px; }
      button{ width:100%; min-width:0; font-size:20px; }
      .channel-btn{ font-size:22px; min-height:62px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <h1 class="title">Coeziv TV Player</h1>
    <p class="subtitle">Listă optimizată pentru Smart TV. Alege un canal sau schimbă playlistul.</p>

    <input id="searchInput" class="search" type="text" placeholder="Caută canal...">

    <div class="actions">
      <button class="btn-blue" onclick="goConnect()">Schimbă playlist</button>
      <button class="btn-green" onclick="playLastChannel()">Ultimul canal</button>
      <button class="btn-gray" onclick="clearPlaylist()">Șterge playlist</button>
    </div>

    <div id="messageBox" class="message">Player pregătit.</div>

    <div class="badges">
      <div class="badge" id="countBadge">Canale: 0</div>
      <div class="badge" id="savedBadge">Playlist salvat: nu</div>
    </div>
  </div>

  <div class="list" id="channelList"></div>
</div>

<script>
  var allChannels = [];
  var filteredChannels = [];

  function setMessage(text, type){
    var box = document.getElementById("messageBox");
    box.className = "message";
    if(type === "ok"){ box.className += " ok"; }
    if(type === "err"){ box.className += " err"; }
    box.innerHTML = text;
  }

  function updateBadges(){
    document.getElementById("countBadge").innerHTML = "Canale: " + filteredChannels.length;
    document.getElementById("savedBadge").innerHTML =
      "Playlist salvat: " + (localStorage.getItem("coeziv_tv_playlist") ? "da" : "nu");
  }

  function escapeHtml(text){
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function parseM3U(text){
    text = String(text || "").replace(/\r/g, "");
    var lines = text.split("\n");
    var channels = [];
    var meta = null;
    var i, line, parts, name, prev, fallback, next;

    for(i = 0; i < lines.length; i++){
      line = lines[i];
      if(!line){ continue; }
      line = line.replace(/^\s+|\s+$/g, "");
      if(!line){ continue; }

      if(line.indexOf("#EXTINF") === 0){
        name = "Canal";
        parts = line.split(",");
        if(parts.length > 1){
          name = parts.slice(1).join(",").replace(/^\s+|\s+$/g, "") || "Canal";
        }
        meta = { name: name };
      }
      else if(line.charAt(0) === "#"){
        continue;
      }
      else if(line.indexOf("http://") === 0 || line.indexOf("https://") === 0){
        if(meta){
          channels.push({
            name: meta.name,
            url: line
          });
          meta = null;
        }else{
          prev = i > 0 ? lines[i - 1] : "";
          prev = String(prev || "").replace(/^\s+|\s+$/g, "");
          fallback = (prev && prev.charAt(0) !== "#" && prev.indexOf("http") !== 0)
            ? prev
            : ("Canal " + (channels.length + 1));

          channels.push({
            name: fallback,
            url: line
          });
        }
      }
      else{
        next = i + 1 < lines.length ? lines[i + 1] : "";
        next = String(next || "").replace(/^\s+|\s+$/g, "");
        if(next.indexOf("http://") === 0 || next.indexOf("https://") === 0){
          channels.push({
            name: line,
            url: next
          });
          i = i + 1;
          meta = null;
        }
      }
    }

    return channels;
  }

  function renderChannels(list){
    var box = document.getElementById("channelList");
    box.innerHTML = "";

    filteredChannels = list || [];
    updateBadges();

    if(!filteredChannels.length){
      box.innerHTML = "<div class='channel-row'>Nu există canale de afișat.</div>";
      return;
    }

    for(var i = 0; i < filteredChannels.length; i++){
      var ch = filteredChannels[i];
      var row = document.createElement("div");
      row.className = "channel-row";

      row.innerHTML =
        "<button class='channel-btn' onclick='playChannel(" + i + ")'>" +
          escapeHtml(ch.name) +
          "<span class='meta'>Apasă pentru redare</span>" +
        "</button>";

      box.appendChild(row);
    }
  }

  function playChannel(index){
    var ch = filteredChannels[index];
    if(!ch || !ch.url){
      setMessage("Canal invalid.", "err");
      return;
    }

    localStorage.setItem("coeziv_tv_last_channel_name", ch.name);
    localStorage.setItem("coeziv_tv_last_channel_url", ch.url);
    setMessage("Se deschide canalul: " + ch.name, "ok");
    window.location.href = ch.url;
  }

  function playLastChannel(){
    var url = localStorage.getItem("coeziv_tv_last_channel_url");
    var name = localStorage.getItem("coeziv_tv_last_channel_name") || "ultimul canal";

    if(!url){
      setMessage("Nu există ultim canal salvat.", "err");
      return;
    }

    setMessage("Se deschide " + name + "...", "ok");
    window.location.href = url;
  }

  function goConnect(){
    window.location.href = "tv-connect.html";
  }

  function clearPlaylist(){
    localStorage.removeItem("coeziv_tv_playlist");
    localStorage.removeItem("coeziv_tv_last_update");
    localStorage.removeItem("coeziv_tv_last_channel_name");
    localStorage.removeItem("coeziv_tv_last_channel_url");
    allChannels = [];
    filteredChannels = [];
    renderChannels([]);
    setMessage("Playlistul local a fost șters.", "ok");
  }

  function filterChannels(){
    var q = document.getElementById("searchInput").value;
    q = String(q || "").toLowerCase().trim();

    if(!q){
      renderChannels(allChannels);
      return;
    }

    var list = [];
    for(var i = 0; i < allChannels.length; i++){
      if(String(allChannels[i].name || "").toLowerCase().indexOf(q) !== -1){
        list.push(allChannels[i]);
      }
    }
    renderChannels(list);
  }

  function initPlayer(){
    var playlistText = localStorage.getItem("coeziv_tv_playlist");

    if(!playlistText){
      setMessage("Nu există playlist salvat. Te redirecționez la conectare...", "err");
      updateBadges();
      setTimeout(function(){
        goConnect();
      }, 900);
      return;
    }

    allChannels = parseM3U(playlistText);
    renderChannels(allChannels);

    if(allChannels.length){
      setMessage("Playlist încărcat local cu succes.", "ok");
    }else{
      setMessage("Playlistul salvat nu conține canale valide.", "err");
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    var search = document.getElementById("searchInput");
    if(search){
      search.addEventListener("input", filterChannels);
      search.focus();
    }
    initPlayer();
  });
</script>

</body>
</html>
