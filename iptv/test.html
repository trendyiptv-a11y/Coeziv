<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Player Sony</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
}

#video {
  width: 100%;
  height: 80%;
  background: #000;
}

#controls {
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
}

#status {
  margin-top: 10px;
  font-size: 14px;
  color: #22c55e;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<div id="controls">
  <input id="url" placeholder="Pune link stream aici">
  <button onclick="play()">Play</button>
  <div id="status"></div>
</div>

<script>
var video = document.getElementById("video");
var statusEl = document.getElementById("status");

function setStatus(txt, ok=true){
  statusEl.style.color = ok ? "#22c55e" : "#ef4444";
  statusEl.textContent = txt;
}

function play(){
  var url = document.getElementById("url").value.trim();

  if(!url){
    setStatus("Introdu un link!", false);
    return;
  }

  video.pause();
  video.src = "";
  setStatus("Se încearcă redarea...");

  tryDirect(url);
}

function tryDirect(url){
  video.src = url;

  var started = false;

  video.onplaying = function(){
    started = true;
    setStatus("✔ Redare directă OK");
  };

  video.onerror = function(){
    if(!started){
      tryHLS(url);
    }
  };

  var p = video.play();
  if(p && p.catch){
    p.catch(function(){
      tryHLS(url);
    });
  }
}

function tryHLS(url){
  if(window.Hls && Hls.isSupported()){
    setStatus("Fallback HLS...");

    var hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function(){
      video.play();
      setStatus("✔ Redare HLS OK");
    });

    hls.on(Hls.Events.ERROR, function(){
      setStatus("❌ Stream incompatibil cu Sony browser", false);
    });

  } else {
    setStatus("❌ Browserul nu suportă HLS", false);
  }
}
</script>

</body>
</html>
