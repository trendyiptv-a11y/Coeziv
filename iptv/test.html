<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowplayer TS Test</title>

  <link rel="stylesheet" href="//cdn.flowplayer.com/releases/native/3/stable/style/flowplayer.css" />
  <script src="//cdn.flowplayer.com/releases/native/3/stable/flowplayer.min.js"></script>
  <script src="//cdn.flowplayer.com/releases/native/3/stable/plugins/hls.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08101f;
      color: #fff;
      padding: 16px;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }
    .panel {
      background: #0f172a;
      border: 1px solid #243244;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin: 0 0 10px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.5;
    }
    input {
      width: 100%;
      border: 2px solid #334155;
      background: #111827;
      color: #fff;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      outline: none;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button, a.btn {
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
    }
    .btn-gray { background: #4b5563; }
    .btn-green { background: #16a34a; }
    .message {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #3f2f0b;
      color: #fde68a;
      min-height: 46px;
    }
    .ok { background: #14532d; color: #bbf7d0; }
    .err { background: #7f1d1d; color: #fecaca; }
    #player {
      width: 100%;
      min-height: 260px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .card {
      background: #13203a;
      border: 1px solid #314257;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      color: #fff;
      text-align: left;
    }
    .card:focus {
      outline: 4px solid #facc15;
      outline-offset: 2px;
    }
    .name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .meta {
      color: #cbd5e1;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Flowplayer TS Test</h1>
      <p>Încarcă automat playlistul și încearcă redarea canalelor în Flowplayer.</p>

      <input id="playlistUrl" value="/iptv/RO_DK.m3u" />

      <div class="actions">
        <button onclick="loadPlaylistFromFile()">Încarcă fișierul</button>
        <button class="btn-gray" onclick="clearAll()">Șterge</button>
      </div>

      <div id="msg" class="message">Pregătit.</div>
    </div>

    <div class="panel">
      <h2 id="nowTitle">Canal selectat: -</h2>
      <div id="player"></div>

      <div class="actions">
        <button onclick="retryPlay()">Reîncearcă</button>
        <a id="openDirect" class="btn btn-green" href="#" target="_self">Deschide direct</a>
      </div>
    </div>

    <div class="panel">
      <h2>Canale</h2>
      <div id="list" class="grid"></div>
    </div>
  </div>

  <script>
    var channels = [];
    var currentIndex = -1;
    var playerInstance = null;

    function setMsg(text, type) {
      var el = document.getElementById("msg");
      el.className = "message";
      if (type === "ok") el.className += " ok";
      if (type === "err") el.className += " err";
      el.textContent = text || "";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseM3U(text) {
      text = String(text || "").replace(/\r/g, "");
      var lines = text.split("\n");
      var out = [];
      var currentName = null;

      for (var i = 0; i < lines.length; i++) {
        var line = (lines[i] || "").trim();
        if (!line) continue;

        if (line.indexOf("#EXTINF") === 0) {
          var parts = line.split(",");
          currentName = parts.length > 1 ? parts.slice(1).join(",").trim() : "Canal";
          continue;
        }

        if (line.charAt(0) === "#") continue;

        if (/^https?:\/\//i.test(line)) {
          out.push({
            name: currentName || ("Canal " + (out.length + 1)),
            url: line
          });
          currentName = null;
        }
      }

      return out;
    }

    function renderList() {
      var box = document.getElementById("list");
      box.innerHTML = "";

      if (!channels.length) {
        box.innerHTML = "<p>Nu există canale valide.</p>";
        return;
      }

      for (var i = 0; i < channels.length; i++) {
        var ch = channels[i];
        var card = document.createElement("button");
        card.className = "card";
        card.type = "button";
        card.setAttribute("data-index", i);
        card.onclick = (function(index) {
          return function() { playChannel(index); };
        })(i);

        card.innerHTML =
          '<div class="name">' + escapeHtml(ch.name) + '</div>' +
          '<div class="meta">' + escapeHtml(ch.url) + '</div>';

        box.appendChild(card);
      }
    }

    function loadPlaylistFromFile() {
      var url = document.getElementById("playlistUrl").value.trim();
      if (!url) {
        setMsg("Introdu calea fișierului playlist.", "err");
        return;
      }

      setMsg("Se încarcă fișierul playlist...", "");

      var xhr = new XMLHttpRequest();
      xhr.open("GET", url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            channels = parseM3U(xhr.responseText || "");
            renderList();
            setMsg("Playlist încărcat. Canale găsite: " + channels.length, "ok");

            if (channels.length) {
              playChannel(0);
            }
          } else {
            setMsg("Nu am putut încărca fișierul playlist.", "err");
          }
        }
      };

      xhr.onerror = function() {
        setMsg("Eroare de rețea la încărcarea fișierului.", "err");
      };

      xhr.send();
    }

    function destroyPlayer() {
      try {
        if (playerInstance && typeof playerInstance.destroy === "function") {
          playerInstance.destroy();
        }
      } catch (e) {}
      playerInstance = null;
      document.getElementById("player").innerHTML = "";
    }

    function playChannel(index) {
      var ch = channels[index];
      if (!ch) {
        setMsg("Canal invalid.", "err");
        return;
      }

      currentIndex = index;
      document.getElementById("nowTitle").textContent = "Canal selectat: " + ch.name;
      document.getElementById("openDirect").href = ch.url;

      setMsg("Se încearcă redarea: " + ch.name, "");

      destroyPlayer();

      try {
        playerInstance = flowplayer("#player", {
          live: true,
          src: [
            {
              type: "application/x-mpegurl",
              src: ch.url
            }
          ]
        });

        if (playerInstance && typeof playerInstance.on === "function") {
          playerInstance.on("ready", function () {
            setMsg("Player pregătit.", "ok");
          });

          playerInstance.on("error", function () {
            setMsg("Flowplayer nu a pornit canalul. Încearcă «Deschide direct».", "err");
          });
        }
      } catch (e) {
        setMsg("Flowplayer a eșuat la inițializare.", "err");
      }
    }

    function retryPlay() {
      if (currentIndex >= 0) {
        playChannel(currentIndex);
      }
    }

    function clearAll() {
      document.getElementById("list").innerHTML = "";
      document.getElementById("nowTitle").textContent = "Canal selectat: -";
      document.getElementById("openDirect").href = "#";
      channels = [];
      currentIndex = -1;
      destroyPlayer();
      setMsg("Șters.", "");
    }

    document.addEventListener("DOMContentLoaded", function() {
      loadPlaylistFromFile();
    });
  </script>
</body>
</html>
