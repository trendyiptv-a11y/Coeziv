<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IPTV TEST SONY</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body style="background:#000;color:#fff;text-align:center">

<video id="video" controls autoplay width="90%"></video>
<br><br>

<input id="url" value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" style="width:80%">
<br><br>

<button onclick="play()">PLAY</button>

<script>
function play() {
  var video = document.getElementById('video');
  var url = document.getElementById('url').value;

  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,function() {
      video.play();
    });
  } 
  else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
  } 
  else {
    alert("NU SUPORTĂ HLS");
  }
}
</script>

</body>
</html>
