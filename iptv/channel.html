<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coeziv TV Direct</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      background:#08101f;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      padding:16px;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
    }

    .panel{
      background:#0f172a;
      border:1px solid #243244;
      border-radius:18px;
      padding:18px;
    }

    .brand{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#1e293b;
      border:1px solid #334155;
      font-size:14px;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 8px;
      font-size:32px;
      line-height:1.2;
    }

    .meta{
      color:#cbd5e1;
      font-size:16px;
      line-height:1.5;
      margin-bottom:16px;
    }

    .player-wrap{
      background:#000;
      border-radius:16px;
      overflow:hidden;
      border:1px solid #243244;
    }

    video{
      width:100%;
      min-height:280px;
      max-height:72vh;
      background:#000;
      display:block;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button, a.btn{
      min-height:56px;
      min-width:180px;
      border:none;
      border-radius:14px;
      padding:12px 18px;
      color:#fff;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      background:#374151;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-blue{ background:#2563eb; }
    .btn-green{ background:#16a34a; }
    .btn-gray{ background:#4b5563; }

    button:focus, a.btn:focus{
      outline:4px solid #facc15;
      outline-offset:3px;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:18px;
      line-height:1.5;
      background:#3f2f0b;
      border:1px solid #6b4f12;
      color:#fde68a;
      min-height:56px;
    }

    .message.ok{
      background:#14532d;
      border-color:#166534;
      color:#bbf7d0;
    }

    .message.err{
      background:#7f1d1d;
      border-color:#991b1b;
      color:#fecaca;
    }

    .info{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      background:#111827;
      border:1px solid #334155;
      color:#cbd5e1;
      font-size:14px;
      word-break:break-all;
    }

    @media (max-width: 820px){
      h1{ font-size:28px; }
      button, a.btn{
        width:100%;
        min-width:0;
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="brand">COEZIV TV • DIRECT</div>
      <h1>TV Live</h1>
      <div class="meta">Player dedicat pentru un singur stream.</div>

      <div class="player-wrap">
        <video id="tvVideo" controls autoplay playsinline></video>
      </div>

      <div id="messageBox" class="message">Se încarcă streamul...</div>

      <div class="actions">
        <button class="btn-blue" type="button" onclick="startPlayback()">Pornește</button>
        <button class="btn-gray" type="button" onclick="reloadPlayback()">Reîncarcă</button>
        <a class="btn btn-green" id="directLink" href="https://coeziv.vercel.app/iptv/tv.m3u8" target="_self">Deschide direct</a>
      </div>

      <div class="info" id="urlInfo">
        Sursă: https://coeziv.vercel.app/iptv/tv.m3u8
      </div>
    </div>
  </div>

  <script>
    var STREAM_URL = "https://coeziv.vercel.app/iptv/tv.m3u8";
    var video = null;
    var hls = null;

    function setMessage(text, type){
      var box = document.getElementById("messageBox");
      box.className = "message";
      if(type === "ok"){ box.className += " ok"; }
      if(type === "err"){ box.className += " err"; }
      box.innerHTML = String(text || "");
    }

    function destroyHls(){
      try{
        if(hls){
          hls.destroy();
          hls = null;
        }
      }catch(e){}
    }

    function startPlayback(){
      if(!video){ return; }

      destroyHls();

      try{
        video.pause();
      }catch(e){}

      try{
        video.removeAttribute("src");
        video.load();
      }catch(e){}

      setMessage("Se încearcă redarea...", "");

      if(window.Hls && Hls.isSupported()){
        try{
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false
          });

          hls.loadSource(STREAM_URL);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, function(){
            var p = video.play();
            if(p && typeof p.catch === "function"){
              p.catch(function(){
                setMessage("Redarea nu a pornit automat.", "err");
              });
            }
          });

          hls.on(Hls.Events.ERROR, function(event, data){
            if(data && data.fatal){
              setMessage("Eroare HLS: " + data.type, "err");
            }
          });

          return;
        }catch(e){
          setMessage("HLS.js a eșuat, încerc direct.", "err");
        }
      }

      if(video.canPlayType("application/vnd.apple.mpegurl")){
        video.src = STREAM_URL;
        var pp = video.play();
        if(pp && typeof pp.catch === "function"){
          pp.catch(function(){
            setMessage("Browserul nu a pornit redarea.", "err");
          });
        }
      } else {
        setMessage("Browserul nu suportă acest stream.", "err");
      }
    }

    function reloadPlayback(){
      startPlayback();
    }

    function handleKeys(e){
      var key = e.key || "";
      var code = e.keyCode || 0;

      if(key === "Enter" || code === 13){
        e.preventDefault();
        startPlayback();
        return;
      }

      if(key === "Backspace" || key === "Escape" || code === 8 || code === 27 || code === 461){
        e.preventDefault();
        window.history.back();
      }
    }

    document.addEventListener("DOMContentLoaded", function(){
      video = document.getElementById("tvVideo");

      if(video){
        video.addEventListener("playing", function(){
          setMessage("Redare pornită.", "ok");
        });

        video.addEventListener("waiting", function(){
          setMessage("Se încarcă bufferul...", "");
        });

        video.addEventListener("error", function(){
          setMessage("Canalul nu pornește în playerul web.", "err");
        });
      }

      document.addEventListener("keydown", handleKeys);
      startPlayback();
    });
  </script>
</body>
</html>
