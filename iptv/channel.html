<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Coeziv TV M3U8</title>
  <style>
    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:#08101f;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      padding:16px;
    }

    .wrap{
      width:100%;
      max-width:none;
      margin:0 auto;
    }

    .hero,
    .section{
      background:#0f172a;
      border:1px solid #243244;
      border-radius:18px;
      padding:18px;
      margin-bottom:18px;
    }

    .brand{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#1e293b;
      border:1px solid #334155;
      color:#ffffff;
      font-size:14px;
      margin-bottom:12px;
    }

    .title{
      margin:0 0 8px;
      font-size:34px;
      line-height:1.15;
      color:#ffffff;
    }

    .subtitle,
    .section-subtitle{
      margin:0;
      color:#cbd5e1;
      font-size:17px;
      line-height:1.6;
    }

    .section-title{
      margin:0 0 10px;
      font-size:28px;
      color:#ffffff;
    }

    .search{
      width:100%;
      margin-top:16px;
      min-height:60px;
      border-radius:14px;
      border:2px solid #334155;
      background:#111827;
      color:#ffffff;
      padding:12px 16px;
      font-size:24px;
      outline:none;
    }

    .search::placeholder{
      color:#cbd5e1;
      opacity:1;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      min-height:58px;
      min-width:210px;
      border:none;
      border-radius:14px;
      padding:12px 18px;
      color:#ffffff;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
      background:#374151;
    }

    .btn-blue{ background:#2563eb; }
    .btn-green{ background:#16a34a; }
    .btn-gray{ background:#4b5563; }

    button:focus,
    .search:focus,
    .tv-card:focus{
      outline:4px solid #facc15;
      outline-offset:3px;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:18px;
      line-height:1.5;
      background:#3f2f0b;
      border:1px solid #6b4f12;
      color:#fde68a;
      min-height:56px;
    }

    .message.ok{
      background:#14532d;
      border-color:#166534;
      color:#bbf7d0;
    }

    .message.err{
      background:#7f1d1d;
      border-color:#991b1b;
      color:#fecaca;
    }

    .badges{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .badge{
      padding:10px 14px;
      border-radius:999px;
      background:#1e293b;
      border:1px solid #334155;
      color:#ffffff;
      font-size:15px;
    }

    .tv-grid{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:14px;
    }

    .tv-card{
      width:23%;
      min-height:120px;
      border:none;
      border-radius:16px;
      background:#13203a;
      border:1px solid #314257;
      color:#ffffff;
      text-align:left;
      padding:14px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
    }

    .tv-card-title{
      font-size:24px;
      font-weight:bold;
      line-height:1.2;
      color:#ffffff;
      margin:0 0 6px;
      word-break:break-word;
    }

    .tv-card-meta{
      font-size:14px;
      color:#cbd5e1;
      line-height:1.4;
    }

    .empty{
      padding:18px;
      border-radius:14px;
      background:#111827;
      border:1px solid #334155;
      color:#cbd5e1;
      font-size:18px;
    }

    @media (max-width: 1100px){
      .tv-card{ width:31%; }
    }

    @media (max-width: 820px){
      body{ padding:12px; }
      .hero,.section{
        border-radius:16px;
        padding:16px;
      }
      .title{ font-size:28px; }
      .subtitle,.section-subtitle,.badge,.message{ font-size:15px; }
      .search{
        font-size:20px;
        min-height:56px;
      }
      button{
        width:100%;
        min-width:0;
        font-size:20px;
      }
      .tv-card{
        width:48%;
        min-height:110px;
      }
      .tv-card-title{ font-size:20px; }
    }

    @media (max-width: 560px){
      .tv-card{ width:100%; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <div class="brand">COEZIV TV • M3U8</div>
    <h1 class="title">Canale din playlist M3U8</h1>
    <p class="subtitle">
      Încarcă automat canalele din <b>tv.m3u8</b>, cu navigare din telecomandă și selectare directă.
    </p>

    <input id="searchInput" class="search" type="text" placeholder="Caută canal...">

    <div class="actions">
      <button class="btn-blue" type="button" onclick="reloadPlaylist()">Reîncarcă playlist</button>
      <button class="btn-green" type="button" onclick="playFirstChannel()">Primul canal</button>
      <button class="btn-gray" type="button" onclick="clearSearch()">Șterge căutarea</button>
    </div>

    <div id="messageBox" class="message">Se pregătește încărcarea playlistului...</div>

    <div class="badges">
      <div class="badge" id="countBadge">Canale: 0</div>
      <div class="badge">Sursă: /iptv/tv.m3u8</div>
    </div>
  </div>

  <div class="section">
    <h2 class="section-title">Canale</h2>
    <p class="section-subtitle">Săgețile din telecomandă mută selecția între canale. Enter deschide canalul.</p>
    <div id="channelList"></div>
  </div>
</div>

<script>
  var PLAYLIST_URL = "https://coeziv.vercel.app/iptv/tv.m3u8";
  var allChannels = [];
  var filteredChannels = [];

  function setMessage(text, type){
    var box = document.getElementById("messageBox");
    box.className = "message";
    if(type === "ok"){ box.className += " ok"; }
    if(type === "err"){ box.className += " err"; }
    box.innerHTML = escapeHtml(text || "");
  }

  function escapeHtml(text){
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function updateBadges(){
    document.getElementById("countBadge").innerHTML = "Canale: " + filteredChannels.length;
  }

  function absolutizeUrl(baseUrl, maybeRelative){
    if(!maybeRelative){ return ""; }
    try{
      return new URL(maybeRelative, baseUrl).href;
    }catch(e){
      return maybeRelative;
    }
  }

  function parseM3U8Playlist(text, baseUrl){
    text = String(text || "").replace(/\r/g, "");
    var lines = text.split("\n");
    var channels = [];
    var i, line, currentName, infParts, rawName;

    currentName = null;

    for(i = 0; i < lines.length; i++){
      line = String(lines[i] || "").trim();
      if(!line){ continue; }

      if(line.indexOf("#EXTINF") === 0){
        infParts = line.split(",");
        rawName = infParts.length > 1 ? infParts.slice(1).join(",").trim() : "";
        currentName = rawName || ("Canal " + (channels.length + 1));
        continue;
      }

      if(line.charAt(0) === "#"){
        continue;
      }

      if(line.indexOf(".m3u8") !== -1 || line.indexOf("http://") === 0 || line.indexOf("https://") === 0){
        channels.push({
          name: currentName || ("Canal " + (channels.length + 1)),
          url: absolutizeUrl(baseUrl, line)
        });
        currentName = null;
      }
    }

    return channels;
  }

  function renderChannels(list){
    var box = document.getElementById("channelList");
    box.innerHTML = "";

    filteredChannels = list || [];
    updateBadges();

    if(!filteredChannels.length){
      box.innerHTML = "<div class='empty'>Nu există canale de afișat.</div>";
      return;
    }

    var grid = document.createElement("div");
    grid.className = "tv-grid";

    for(var i = 0; i < filteredChannels.length; i++){
      var ch = filteredChannels[i];
      var item = document.createElement("button");
      item.className = "tv-card channel-card";
      item.setAttribute("type", "button");
      item.setAttribute("data-index", i);
      item.setAttribute("tabindex", "0");
      item.onclick = (function(index){
        return function(){ playChannel(index); };
      })(i);

      item.innerHTML =
        "<div class='tv-card-title'>" + escapeHtml(ch.name) + "</div>" +
        "<div class='tv-card-meta'>Apasă pentru redare</div>";

      grid.appendChild(item);
    }

    box.appendChild(grid);

    setTimeout(function(){
      focusCard(0);
    }, 50);
  }

  function focusCard(index){
    var cards = document.querySelectorAll(".channel-card");
    if(!cards || !cards.length){ return; }

    if(index < 0){ index = 0; }
    if(index >= cards.length){ index = cards.length - 1; }

    var el = cards[index];
    if(el){
      el.focus();
      try{
        el.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
      }catch(e){
        el.scrollIntoView();
      }
    }
  }

  function getFocusedCardIndex(){
    var active = document.activeElement;
    if(!active){ return -1; }
    if(active.className && String(active.className).indexOf("channel-card") !== -1){
      return parseInt(active.getAttribute("data-index"), 10);
    }
    return -1;
  }

  function findVerticalTarget(currentIndex, direction){
    var cards = document.querySelectorAll(".channel-card");
    var current = cards[currentIndex];
    var i, bestIndex, bestScore;

    if(!cards || !cards.length || !current){
      return currentIndex;
    }

    var currentRect = current.getBoundingClientRect();
    var currentCenterX = currentRect.left + currentRect.width / 2;
    var currentTop = currentRect.top;

    bestIndex = currentIndex;
    bestScore = null;

    for(i = 0; i < cards.length; i++){
      if(i === currentIndex){ continue; }

      var rect = cards[i].getBoundingClientRect();
      var centerX = rect.left + rect.width / 2;
      var deltaY = rect.top - currentTop;

      if(direction === "down" && deltaY <= 10){ continue; }
      if(direction === "up" && deltaY >= -10){ continue; }

      var rowDistance = Math.abs(deltaY);
      var colDistance = Math.abs(centerX - currentCenterX);
      var score = rowDistance * 1000 + colDistance;

      if(bestScore === null || score < bestScore){
        bestScore = score;
        bestIndex = i;
      }
    }

    return bestIndex;
  }

  function playChannel(index){
    var ch = filteredChannels[index];
    if(!ch || !ch.url){
      setMessage("Canal invalid.", "err");
      return;
    }

    setMessage("Se deschide canalul: " + ch.name, "ok");
    window.location.href = ch.url;
  }

  function playFirstChannel(){
    if(!filteredChannels.length){
      setMessage("Nu există canale disponibile.", "err");
      return;
    }
    playChannel(0);
  }

  function clearSearch(){
    var input = document.getElementById("searchInput");
    input.value = "";
    renderChannels(allChannels);
  }

  function filterChannels(){
    var q = document.getElementById("searchInput").value;
    q = String(q || "").toLowerCase().trim();

    if(!q){
      renderChannels(allChannels);
      return;
    }

    var list = [];
    for(var i = 0; i < allChannels.length; i++){
      if(String(allChannels[i].name || "").toLowerCase().indexOf(q) !== -1){
        list.push(allChannels[i]);
      }
    }

    renderChannels(list);
  }

  function reloadPlaylist(){
    setMessage("Se încarcă playlistul...", "");

    var xhr = new XMLHttpRequest();
    xhr.open("GET", PLAYLIST_URL, true);

    xhr.onreadystatechange = function(){
      if(xhr.readyState === 4){
        if(xhr.status >= 200 && xhr.status < 300){
          var parsed = parseM3U8Playlist(xhr.responseText || "", PLAYLIST_URL);
          allChannels = parsed;
          renderChannels(parsed);

          if(parsed.length){
            setMessage("Playlist încărcat cu succes.", "ok");
          }else{
            setMessage("Nu am găsit canale în acest playlist M3U8.", "err");
          }
        }else{
          setMessage("Nu am putut încărca playlistul.", "err");
          renderChannels([]);
        }
      }
    };

    xhr.onerror = function(){
      setMessage("Eroare de rețea la încărcarea playlistului.", "err");
      renderChannels([]);
    };

    xhr.send();
  }

  function handleRemoteNavigation(e){
    var key = e.key || "";
    var code = e.keyCode || 0;
    var index = getFocusedCardIndex();

    if(index === -1){
      return;
    }

    if(key === "ArrowRight" || code === 39){
      e.preventDefault();
      focusCard(index + 1);
      return;
    }

    if(key === "ArrowLeft" || code === 37){
      e.preventDefault();
      focusCard(index - 1);
      return;
    }

    if(key === "ArrowDown" || code === 40){
      e.preventDefault();
      focusCard(findVerticalTarget(index, "down"));
      return;
    }

    if(key === "ArrowUp" || code === 38){
      e.preventDefault();
      focusCard(findVerticalTarget(index, "up"));
      return;
    }

    if(key === "Enter" || code === 13){
      e.preventDefault();
      playChannel(index);
      return;
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    var search = document.getElementById("searchInput");
    if(search){
      search.addEventListener("input", filterChannels);
    }

    document.addEventListener("keydown", handleRemoteNavigation);
    reloadPlaylist();
  });
</script>

</body>
</html>
