<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Coeziv Player TV</title>

<style>
/* (CSS-ul tău rămâne identic — nu l-am modificat) */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#08101f,#0b1020 30%,#0f172a 100%);
  color:#fff;
}
.wrap{max-width:1100px;margin:0 auto;padding:20px;}
.hero{background:linear-gradient(135deg,rgba(37,99,235,.22),rgba(29,78,216,.08));
border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px;margin-bottom:20px;}
.hero h1{margin:0 0 10px;font-size:34px;}
.hero p{color:#cbd5e1;font-size:18px;}
.panel{background:#111827;border-radius:18px;padding:20px;margin-bottom:20px;}
.field{width:100%;padding:16px;border-radius:12px;border:2px solid #334155;background:#0b1322;color:#fff;font-size:20px;}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
button{min-width:180px;padding:14px;border:none;border-radius:12px;font-size:22px;font-weight:bold;cursor:pointer;color:#fff;}
.btn-blue{background:#2563eb;}
.btn-green{background:#16a34a;}
.btn-gray{background:#374151;}
.message{margin-top:10px;padding:14px;border-radius:12px;font-size:18px;}
.message.ok{background:#064e3b;color:#bbf7d0;}
.message.err{background:#7f1d1d;color:#fecaca;}
.badge{padding:10px;border-radius:999px;background:#1f2937;}
.channel{padding:18px 0;border-bottom:1px solid rgba(255,255,255,.08);}
.channel-title{font-size:28px;font-weight:bold;}
.play-link{color:#60a5fa;font-size:22px;}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>Coeziv Player TV</h1>
<p>Versiune optimizată pentru Smart TV</p>
</div>

<!-- 🔥 NOU: COD TV -->
<div class="panel">
<h2>Cod TV</h2>
<p>Introdu codul primit de pe telefon sau PC</p>

<input id="tvCodeInput" class="field" placeholder="Ex: K7P4M">

<div class="row">
<button class="btn-green" onclick="loadTVCode()">Încarcă din cod</button>
</div>
</div>

<!-- Import playlist (original) -->
<div class="panel">
<h2>Import playlist</h2>

<input id="urlInput" class="field" placeholder="URL playlist M3U">

<div class="row">
<button class="btn-blue" onclick="loadURL()">Încarcă URL</button>
<button class="btn-gray" onclick="loadDemo()">Demo</button>
</div>

<textarea id="textInput" class="field"></textarea>

<div class="row">
<button class="btn-blue" onclick="loadText()">Import text</button>
<button class="btn-gray" onclick="resetPlayer()">Reset</button>
</div>

<div id="messageBox" class="message">Aștept input...</div>

<div class="badge" id="countBadge">Canale: 0</div>
</div>

<div class="panel">
<h2>Canale</h2>
<div id="channels"></div>
</div>

</div>

<script>
var LIMIT = 30;
var allChannels = [];

/* ===== PARSER ===== */
function parseM3U(text){
  var lines = text.split("\n");
  var channels = [];
  var name = "";

  for(var i=0;i<lines.length;i++){
    var line = lines[i].trim();

    if(line.indexOf("#EXTINF") === 0){
      name = line.split(",")[1] || "Canal";
    }
    else if(line.indexOf("http") === 0){
      channels.push({name:name,url:line});
    }
  }

  return channels;
}

/* ===== RENDER ===== */
function renderChannels(list){
  var box = document.getElementById("channels");
  box.innerHTML = "";

  document.getElementById("countBadge").innerHTML = "Canale: " + list.length;

  for(var i=0;i<list.length;i++){
    var ch = list[i];
    var div = document.createElement("div");
    div.className = "channel";
    div.innerHTML =
      "<div class='channel-title'>"+ch.name+"</div>"+
      "<a class='play-link' href='"+ch.url+"' target='_blank'>Play</a>";
    box.appendChild(div);
  }
}

/* ===== TV CODE LOAD ===== */
function loadTVCode(){
  var code = document.getElementById("tvCodeInput").value.trim().toUpperCase();

  if(!code){
    setMessage("Introdu codul.", "err");
    return;
  }

  setMessage("Se încarcă...");

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/load-tv-code", true);
  xhr.setRequestHeader("Content-Type", "application/json");

  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      var data = JSON.parse(xhr.responseText || "{}");

      if(xhr.status === 200 && data.ok){
        document.getElementById("textInput").value = data.playlistText;
        var channels = parseM3U(data.playlistText);
        renderChannels(channels);
        setMessage("Playlist încărcat din cod TV.", "ok");
      }else{
        setMessage(data.error || "Cod invalid.", "err");
      }
    }
  };

  xhr.send(JSON.stringify({code:code}));
}

/* ===== REST ===== */
function setMessage(text,type){
  var box = document.getElementById("messageBox");
  box.className = "message " + (type || "");
  box.innerHTML = text;
}

function loadText(){
  var text = document.getElementById("textInput").value;
  var channels = parseM3U(text);
  renderChannels(channels);
}

function loadDemo(){
  var xhr = new XMLHttpRequest();
  xhr.open("GET","romanesti.m3u",true);
  xhr.onload = function(){
    document.getElementById("textInput").value = xhr.responseText;
    renderChannels(parseM3U(xhr.responseText));
  };
  xhr.send();
}

function loadURL(){
  var url = document.getElementById("urlInput").value;
  var xhr = new XMLHttpRequest();
  xhr.open("GET",url,true);
  xhr.onload = function(){
    document.getElementById("textInput").value = xhr.responseText;
    renderChannels(parseM3U(xhr.responseText));
  };
  xhr.send();
}

function resetPlayer(){
  document.getElementById("textInput").value="";
  document.getElementById("channels").innerHTML="";
}
</script>

</body>
</html>
