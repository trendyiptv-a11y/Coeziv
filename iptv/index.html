<!DOCTYPE html><html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coeziv TV România</title>
<style>
:root{
  --bg:#141414;
  --card:#1f1f1f;
  --card-hover:#2a2a2a;
  --text:#ffffff;
  --muted:#b3b3b3;
  --line:#333333;
  --brand:#e50914;
  --focus:#ffffff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
body{min-height:100vh}
button,input{font:inherit}header{ padding:22px 20px 14px; font-size:34px; font-weight:900; color:var(--brand); letter-spacing:.5px; }

.sub{ padding:0 20px 6px; color:var(--muted); font-size:14px; }

.search{ padding:16px 20px 20px; } .search input{ width:100%; max-width:460px; padding:14px 16px; background:#1a1a1a; border:1px solid var(--line); color:var(--text); border-radius:10px; outline:none; } .search input:focus, .search input:focus-visible{ border-color:#777; box-shadow:0 0 0 3px rgba(255,255,255,.18); }

.info{ padding:0 20px 10px; color:var(--muted); font-size:13px; }

.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; padding:20px; }

.card{ background:var(--card); border:1px solid rgba(255,255,255,.05); border-radius:14px; overflow:hidden; cursor:pointer; transition:transform .18s ease, background .18s ease, border-color .18s ease; } .card:hover{ transform:scale(1.03); background:var(--card-hover); border-color:rgba(255,255,255,.18); } .card:focus, .card:focus-visible, .card.focused{ outline:none; transform:scale(1.04); border-color:var(--focus); box-shadow:0 0 0 3px rgba(255,255,255,.22); }

.thumb{ aspect-ratio:16/9; background:linear-gradient(135deg,#1e1e1e,#343434); display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:800; }

.card-body{ padding:14px; } .card-title{ font-size:15px; font-weight:700; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .card-meta{ margin-top:6px; font-size:12px; color:var(--muted); } .card-btn{ margin-top:12px; width:100%; padding:10px 12px; border:none; border-radius:999px; background:var(--brand); color:#fff; font-weight:700; } .card-btn:hover{filter:brightness(1.06)}

.status{ padding:0 20px 10px; color:var(--muted); font-size:13px; white-space:pre-line; }

@media (max-width:720px){ header{font-size:28px} .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:16px} .search{padding:14px 16px 16px} .sub,.info,.status{padding-left:16px;padding-right:16px} } </style>

</head>
<body><header>COEZIV TV</header>
<div class="sub">Canale românești • versiune simplă, rapidă și stabilă</div><div class="search">
  <input id="search" placeholder="Caută canal...">
</div><div id="status" class="status">Playlistul se încarcă...</div>
<div class="info">Click sau Enter pe un card pentru a deschide canalul direct.</div><div id="grid" class="grid"></div><script>
const PLAYLIST_URL = "/iptv/romanesti.m3u";

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const status = document.getElementById("status");

let channels = [];
let filtered = [];

async function loadPlaylist(){
  status.textContent = "Playlistul se încarcă...";
  try {
    const res = await fetch(PLAYLIST_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Nu am putut încărca playlistul.");
    const text = await res.text();
    channels = parseM3U(text);
    filtered = [...channels];
    status.textContent = `Canale încărcate: ${channels.length}`;
    render();
  } catch (err) {
    status.textContent = "Eroare la încărcarea playlistului.\n\n" + (err?.message || "Necunoscut");
  }
}

function parseM3U(text){
  const lines = text.split(/\r?\n/);
  const result = [];
  let current = null;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;

    if (line.startsWith("#EXTINF")) {
      const parts = line.split(",");
      const title = (parts[parts.length - 1] || "Canal necunoscut").trim();
      current = { title, url: "" };
    } else if (line.startsWith("http") && current) {
      current.url = line;
      result.push(current);
      current = null;
    }
  }

  return result;
}

function render(){
  const q = search.value.toLowerCase().trim();
  filtered = channels.filter(c => c.title.toLowerCase().includes(q));
  grid.innerHTML = "";

  if (!filtered.length) {
    status.textContent = "Nu există canale pentru filtrul curent.";
    return;
  }

  status.textContent = `Rezultate afișate: ${filtered.length}`;

  filtered.forEach((ch) => {
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;

    card.innerHTML = `
      <div class="thumb">TV</div>
      <div class="card-body">
        <div class="card-title">${escapeHtml(ch.title)}</div>
        <div class="card-meta">România • Live</div>
        <button class="card-btn" type="button">Deschide</button>
      </div>
    `;

    const open = () => window.open(ch.url, "_blank");

    card.addEventListener("click", open);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        open();
      }
    });

    card.querySelector(".card-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      open();
    });

    grid.appendChild(card);
  });
}

function escapeHtml(str){
  return (str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

search.addEventListener("input", render);
loadPlaylist();
</script></body>
</html>
