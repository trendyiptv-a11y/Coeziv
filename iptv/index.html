<!DOCTYPE html>
<html lang="ro">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coeziv TV</title>

<style>

body{
background:#050b16;
color:white;
font-family:Arial;
margin:0;
}

header{
padding:15px;
background:#0d1526;
}

.container{
display:flex;
height:100vh;
}

.channels{
width:320px;
overflow:auto;
background:#0b1322;
}

.channel{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.channel:hover{
background:#111c31;
}

.player{
flex:1;
padding:20px;
}

video{
width:100%;
background:black;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<header>
<h2>Coeziv TV</h2>
</header>

<div class="container">

<div id="channels" class="channels"></div>

<div class="player">

<div style="position:relative">

<video id="video" controls playsinline muted></video>

<div id="overlay" class="overlay" style="display:none">
<button onclick="manualPlay()">Pornește canalul</button>
</div>

</div>

<button onclick="openDirect()">Deschide direct</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const PLAYLIST =
"https://raw.githubusercontent.com/trendyiptv-a11y/Coeziv/main/iptv.m3u"

const video = document.getElementById("video")
const list = document.getElementById("channels")
const overlay = document.getElementById("overlay")

let hls=null
let currentUrl=null

fetch(PLAYLIST)
.then(r=>r.text())
.then(text=>{

let lines=text.split("\n")

for(let i=0;i<lines.length;i++){

if(lines[i].includes("#EXTINF")){

let title = lines[i].split(",")[1]
let url = lines[i+1]

let div=document.createElement("div")
div.className="channel"
div.innerText=title

div.onclick=()=>playChannel(url)

list.appendChild(div)

}

}

})

function playChannel(url){

currentUrl=url

overlay.style.display="none"

if(hls){
hls.destroy()
hls=null
}

video.pause()
video.removeAttribute("src")
video.load()

// 1. incearca playerul nativ

video.src=url

video.play().then(()=>{
console.log("player nativ")
}).catch(()=>{

// 2. daca nu merge → foloseste HLS.js

if(Hls.isSupported()){

hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.muted=true

video.play().catch(()=>{
overlay.style.display="flex"
})

})

hls.on(Hls.Events.ERROR,function(){

overlay.style.display="flex"

})

}else{

overlay.style.display="flex"

}

})

}

function manualPlay(){

video.play().catch(()=>{

openDirect()

})

overlay.style.display="none"

}

function openDirect(){

if(currentUrl){

window.open(currentUrl,"_blank")

}

}

</script>

</body>
</html>
