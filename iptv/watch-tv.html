<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
video{width:100%;height:100vh;background:#000}
.overlay{
 position:absolute;top:0;left:0;padding:20px;
}
.title{font-size:28px}
.controls{
 position:absolute;bottom:20px;left:50%;
 transform:translateX(-50%);
 display:flex;gap:10px;
}
button{
 padding:10px 15px;font-size:18px;
}
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<div class="overlay">
  <div id="title" class="title"></div>
</div>

<div class="controls">
  <button onclick="prev()">Prev</button>
  <button onclick="back()">Back</button>
  <button onclick="next()">Next</button>
</div>

<script>
let channels = JSON.parse(localStorage.getItem("coeziv_tv_channels") || "[]");
let currentUrl = localStorage.getItem("coeziv_tv_last_channel_url");
let index = 0;

const video = document.getElementById("video");
const title = document.getElementById("title");

for(let i=0;i<channels.length;i++){
  if(channels[i].url === currentUrl){
    index = i;
  }
}

function play(i){
  let ch = channels[i];
  if(!ch) return;

  index = i;
  title.innerText = ch.name;

  localStorage.setItem("coeziv_tv_last_channel_url", ch.url);
  localStorage.setItem("coeziv_tv_last_channel_name", ch.name);

  if(Hls.isSupported()){
    let hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(video);
  } else {
    video.src = ch.url;
  }
}

function next(){
  play((index+1)%channels.length);
}

function prev(){
  play((index-1+channels.length)%channels.length);
}

function back(){
  window.location.href="tv-player.html";
}

play(index);

// telecomandă
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});
</script>

</body>
</html>
