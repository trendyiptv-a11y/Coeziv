<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activare Player</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.card{
  background:#111827;
  padding:40px;
  border-radius:14px;
  width:360px;
  max-width:100%;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
  margin-bottom:10px;
}

p{
  color:#9ca3af;
  font-size:14px;
  line-height:1.6;
}

input{
  width:100%;
  padding:12px;
  margin-top:20px;
  border-radius:8px;
  border:none;
  font-size:15px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.activate{
  background:#2563eb;
  color:white;
}

.request{
  background:#374151;
  color:white;
}

.status{
  margin-top:15px;
  font-size:14px;
  min-height:22px;
}

.success{
  color:#22c55e;
}

.error{
  color:#ef4444;
}

.info{
  color:#fbbf24;
}

.device{
  margin-top:20px;
  font-size:12px;
  color:#6b7280;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="card">

  <h1>Activare</h1>

  <p>
    Introdu codul de activare pentru a debloca accesul complet pe acest dispozitiv.
  </p>

  <input id="code" placeholder="Cod de activare" autocomplete="off">

  <button id="activateBtn" class="activate" onclick="activatePremium()">
    Activează
  </button>

  <button class="request" onclick="requestCode()">
    Vreau cod
  </button>

  <div id="status" class="status"></div>

  <div class="device">
    Dispozitiv: <span id="device"></span>
  </div>

</div>

<script>
function getDeviceID(){
  var id = localStorage.getItem("device_id");

  if(!id){
    if(window.crypto && window.crypto.randomUUID){
      id = window.crypto.randomUUID();
    }else{
      id = "dev-" + Math.random().toString(36).slice(2) + "-" + Date.now().toString(36);
    }
    localStorage.setItem("device_id", id);
  }

  return id;
}

var deviceID = getDeviceID();
document.getElementById("device").innerText = deviceID;

function setStatus(text, type){
  var status = document.getElementById("status");
  var cls = type === "success" ? "success" : type === "error" ? "error" : "info";
  status.innerHTML = '<div class="' + cls + '">' + escapeHtml(text) + '</div>';
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function requestCode(){
  window.location.href = "request-code.html";
}

async function activatePremium(){
  var codeInput = document.getElementById("code");
  var activateBtn = document.getElementById("activateBtn");
  var code = String(codeInput.value || "").trim().toUpperCase();

  if(!code){
    setStatus("Introdu un cod valid.", "error");
    return;
  }

  activateBtn.disabled = true;
  setStatus("Se verifică licența...", "info");

  try{
    var res = await fetch("/api/activate-license", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        code: code,
        deviceId: deviceID
      })
    });

    var data = await res.json();

    if(!res.ok || !data.ok || !data.premium){
      throw new Error(data.error || "Activarea a eșuat.");
    }

    localStorage.setItem("pro", "true");
    localStorage.setItem("activated_license_code", code);

    setStatus("Activare reușită!", "success");

    setTimeout(function(){
      window.location.href = "player.html";
    }, 1200);

  }catch(err){
    setStatus(err.message || "Nu am putut activa licența.", "error");
  }finally{
    activateBtn.disabled = false;
  }
}
</script>

</body>
</html>
