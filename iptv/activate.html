<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activare Player</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:40px;
border-radius:14px;
width:360px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-bottom:10px;
}

p{
color:#9ca3af;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:20px;
border-radius:8px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.activate{
background:#2563eb;
color:white;
}

.request{
background:#374151;
color:white;
}

.status{
margin-top:15px;
font-size:14px;
}

.success{
color:#22c55e;
}

.error{
color:#ef4444;
}

.device{
margin-top:20px;
font-size:12px;
color:#6b7280;
word-break:break-all;
}

</style>
</head>

<body>

<div class="card">

<h1>Activare</h1>

<p>
Introdu codul de activare pentru a debloca accesul complet.
</p>

<input id="code" placeholder="Cod de activare">

<button class="activate" onclick="activate()">
Activează
</button>

<button class="request" onclick="requestCode()">
Vreau cod
</button>

<div id="status" class="status"></div>

<div class="device">
Dispozitiv: <span id="device"></span>
</div>

</div>

<script>

function getDeviceID(){

let id = localStorage.getItem("device_id")

if(!id){

id = crypto.randomUUID()

localStorage.setItem("device_id", id)

}

return id

}

const deviceID = getDeviceID()

document.getElementById("device").innerText = deviceID

function activate(){

const code = document.getElementById("code").value.trim()

if(code.length < 4){

showError("Introdu un cod valid")

return

}

localStorage.setItem("pro","true")

showSuccess("Activare reușită!")

setTimeout(()=>{

window.location.href="player.html"

},1500)

}

function requestCode(){

window.location.href="request-code.html"

}

function showSuccess(text){

document.getElementById("status").innerHTML =
'<div class="success">'+text+'</div>'

}

function showError(text){

document.getElementById("status").innerHTML =
'<div class="error">'+text+'</div>'

}

</script>

</body>
</html>
