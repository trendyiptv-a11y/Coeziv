<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activare Coeziv Player</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
max-width:420px;
margin:auto;
margin-top:80px;
background:#111827;
padding:30px;
border-radius:12px;
text-align:center;
}

h1{
margin-bottom:10px;
}

p{
color:#9ca3af;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-gray{
background:#374151;
color:white;
}

.device{
margin-top:20px;
font-size:13px;
color:#6b7280;
}

.success{
color:#22c55e;
margin-top:15px;
}

.error{
color:#ef4444;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>Activează Playerul</h1>

<p>
Introdu codul de activare pentru a debloca versiunea completă.
</p>

<input id="code" placeholder="Cod de activare">

<button class="btn-primary" onclick="activate()">
Activează
</button>

<button class="btn-gray" onclick="requestCode()">
Vreau cod
</button>

<div id="status"></div>

<div class="device">
Dispozitiv: <span id="device"></span>
</div>

</div>

<script>

let deviceID

function getDeviceID(){

let id = localStorage.getItem("device_id")

if(!id){

id = crypto.randomUUID()

localStorage.setItem("device_id",id)

}

return id

}

deviceID = getDeviceID()

document.getElementById("device").innerText = deviceID

function activate(){

const code = document.getElementById("code").value.trim()

if(code.length < 4){

showError("Introdu un cod valid")

return

}

localStorage.setItem("pro","true")

showSuccess("Activare reușită!")

setTimeout(()=>{

window.location.href="player.html"

},1500)

}

function requestCode(){

window.location.href = "request-code.html"

}

function showSuccess(msg){

document.getElementById("status").innerHTML =
`<div class="success">${msg}</div>`

}

function showError(msg){

document.getElementById("status").innerHTML =
`<div class="error">${msg}</div>`

}

</script>

</body>
</html>
