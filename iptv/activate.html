<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activare Player</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.card{
  background:#111827;
  padding:40px;
  border-radius:14px;
  width:380px;
  max-width:100%;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
  margin-bottom:10px;
}

p{
  color:#9ca3af;
  font-size:14px;
  line-height:1.6;
}

input{
  width:100%;
  padding:12px;
  margin-top:20px;
  border-radius:8px;
  border:none;
  font-size:15px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:focus,
input:focus{
  outline:4px solid #facc15;
  outline-offset:3px;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.activate{
  background:#2563eb;
  color:white;
}

.request{
  background:#374151;
  color:white;
}

.status{
  margin-top:15px;
  font-size:14px;
  min-height:22px;
}

.success{
  color:#22c55e;
}

.error{
  color:#ef4444;
}

.info{
  color:#fbbf24;
}

.device{
  margin-top:20px;
  font-size:12px;
  color:#6b7280;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="card">

  <h1>Activare</h1>

  <p>
    Introdu codul de activare pentru a debloca accesul complet pe acest dispozitiv.
  </p>

  <input id="code" placeholder="Cod de activare" autocomplete="off">

  <button id="activateBtn" type="button" class="activate" onclick="activatePremium()">
    Activează
  </button>

  <button type="button" class="request" onclick="requestCode()">
    Vreau cod
  </button>

  <div id="status" class="status"></div>

  <div class="device">
    Dispozitiv: <span id="device"></span>
  </div>

</div>

<script>
var DEVICE_KEY = "coeziv_device_id";

function getDeviceID(){
  var id = localStorage.getItem(DEVICE_KEY);

  if(!id){
    try{
      if(window.crypto && window.crypto.randomUUID){
        id = window.crypto.randomUUID();
      }
    }catch(e){}

    if(!id){
      id = "dev-" + Math.random().toString(36).slice(2) + "-" + new Date().getTime().toString(36);
    }

    localStorage.setItem(DEVICE_KEY, id);
  }

  return id;
}

var deviceID = getDeviceID();
document.getElementById("device").innerHTML = escapeHtml(deviceID);

function setStatus(text, type){
  var status = document.getElementById("status");
  var cls = type === "success" ? "success" : type === "error" ? "error" : "info";
  status.innerHTML = '<div class="' + cls + '">' + escapeHtml(text) + '</div>';
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function requestCode(){
  window.location.href = "request-code.html";
}

function postJson(url, payload, onSuccess, onError){
  var xhr = new XMLHttpRequest();
  xhr.open("POST", url, true);
  xhr.setRequestHeader("Content-Type", "application/json");

  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      var data = null;

      try{
        data = JSON.parse(xhr.responseText || "{}");
      }catch(e){
        if(onError){ onError("Răspuns invalid de la server."); }
        return;
      }

      if(xhr.status >= 200 && xhr.status < 300){
        if(onSuccess){ onSuccess(data); }
      }else{
        if(onError){ onError((data && data.error) ? data.error : "Eroare server."); }
      }
    }
  };

  xhr.onerror = function(){
    if(onError){ onError("Eroare de rețea."); }
  };

  xhr.send(JSON.stringify(payload));
}

function activatePremium(){
  var codeInput = document.getElementById("code");
  var activateBtn = document.getElementById("activateBtn");
  var code = String(codeInput.value || "").replace(/^\s+|\s+$/g, "").toUpperCase();

  if(!code){
    setStatus("Introdu un cod valid.", "error");
    return;
  }

  activateBtn.disabled = true;
  setStatus("Se verifică licența...", "info");

  postJson(
    "/api/activate-license",
    {
      code: code,
      deviceId: deviceID
    },
    function(data){
      if(!data || !data.ok || !data.premium){
        activateBtn.disabled = false;
        setStatus((data && data.error) ? data.error : "Activarea a eșuat.", "error");
        return;
      }

      localStorage.setItem("pro", "true");
      localStorage.setItem("activated_license_code", code);

      setStatus("Activare reușită!", "success");

      setTimeout(function(){
        window.location.href = "player.html";
      }, 1200);
    },
    function(errorText){
      activateBtn.disabled = false;
      setStatus(errorText || "Nu am putut activa licența.", "error");
    }
  );
}

document.addEventListener("DOMContentLoaded", function(){
  var input = document.getElementById("code");
  if(input){
    input.focus();
    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        activatePremium();
      }
    });
  }
});
</script>

</body>
</html>
