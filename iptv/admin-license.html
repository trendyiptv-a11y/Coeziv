<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Licențe</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.card{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:420px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.primary{ background:#2563eb; color:white; }
.secondary{ background:#374151; color:white; }
.danger{ background:#ef4444; color:white; }

.status{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>Admin Licențe</h2>

<input id="adminKey" type="password" placeholder="Admin Key">

<button class="secondary" onclick="clearAdminKey()">Șterge cheia</button>

<hr>

<input id="days" placeholder="Zile (ex: 30)">
<button class="primary" onclick="createLicense()">Generează cod</button>

<hr>

<button class="secondary" onclick="loadLicenses()">Vezi coduri</button>

<div id="list"></div>

<div id="status" class="status"></div>

</div>

<script>

function setStatus(text){
  document.getElementById("status").innerHTML = text;
}

function clearAdminKey(){
  var el = document.getElementById("adminKey");
  if(el){ el.value = ""; }
}

function post(url, data, success, error){
  var xhr = new XMLHttpRequest();
  xhr.open("POST", url, true);
  xhr.setRequestHeader("Content-Type", "application/json");

  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      var res;
      try{
        res = JSON.parse(xhr.responseText || "{}");
      }catch(e){
        error("Eroare server");
        return;
      }

      if(xhr.status >= 200 && xhr.status < 300){
        success(res);
      }else{
        error(res.error || "Eroare");
      }
    }
  };

  xhr.onerror = function(){
    error("Eroare rețea");
  };

  xhr.send(JSON.stringify(data));
}

function createLicense(){
  var adminKey = document.getElementById("adminKey").value.trim();
  var days = document.getElementById("days").value.trim();

  if(!adminKey){ setStatus("Introdu admin key"); return; }
  if(!days){ days = 30; }

  setStatus("Se generează...");

  post("/api/create-license",
    { adminKey: adminKey, days: parseInt(days) },
    function(res){
      setStatus("Cod: <b>"+res.code+"</b>");
      clearAdminKey(); // 🔥 securitate
    },
    function(err){
      setStatus(err);
    }
  );
}

function loadLicenses(){
  var adminKey = document.getElementById("adminKey").value.trim();

  if(!adminKey){ setStatus("Introdu admin key"); return; }

  setStatus("Se încarcă...");

  post("/api/list-licenses",
    { adminKey: adminKey },
    function(res){

      var html = "";

      for(var i=0;i<res.length;i++){
        var c = res[i];

        html += "<div style='margin-top:10px;padding:10px;background:#1f2937;border-radius:6px'>";
        html += "<b>"+c.code+"</b><br>";
        html += "Expiră: "+(c.expires || "-")+"<br>";
        html += "Device: "+(c.deviceId || "-")+"<br>";
        html += "<button class='danger' onclick=\"deleteLicense('"+c.code+"')\">Șterge</button>";
        html += "</div>";
      }

      document.getElementById("list").innerHTML = html;

      clearAdminKey(); // 🔥 securitate
    },
    function(err){
      setStatus(err);
    }
  );
}

function deleteLicense(code){
  var adminKey = document.getElementById("adminKey").value.trim();

  if(!adminKey){ setStatus("Introdu admin key"); return; }

  if(!confirm("Ștergi codul?")) return;

  post("/api/delete-license",
    { adminKey: adminKey, code: code },
    function(){
      setStatus("Șters");
      loadLicenses();
      clearAdminKey(); // 🔥 securitate
    },
    function(err){
      setStatus(err);
    }
  );
}

</script>

</body>
</html>
