<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coeziv Player</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

header{
padding:20px;
font-size:22px;
font-weight:bold;
background:#111827;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-green{
background:#16a34a;
color:white;
}

.btn-gray{
background:#374151;
color:white;
}

.channel{
padding:10px;
border-bottom:1px solid #334155;
}

</style>
</head>

<body>

<header>
COEZIV PLAYER
</header>

<div class="container">

<h3>Import playlist</h3>

<input id="urlInput" placeholder="URL playlist M3U">

<div class="row">

<button class="btn-primary" onclick="loadURL()">
Import URL
</button>

<button class="btn-gray" onclick="loadDemo()">
Încarcă demo
</button>

<input type="file" onchange="loadFile(event)">

</div>

<textarea id="textInput" placeholder="Lipeste playlist M3U"></textarea>

<button class="btn-primary" onclick="loadText()">
Import text
</button>

<hr>

<div class="row">

<button class="btn-green" onclick="goActivate()">
Activează
</button>

<button class="btn-gray" onclick="goRequestCode()">
Vreau cod
</button>

</div>

<hr>

<h3>Canale</h3>

<div id="channels"></div>

</div>

<script>

const LIMIT = 30
let isActivated = false

function parseM3U(text){

const lines = text.split("\n")

let channels=[]
let name=""

for(let line of lines){

line=line.trim()

if(line.startsWith("#EXTINF")){

name=line.split(",")[1]

}

if(line.startsWith("http")){

channels.push({
name:name,
url:line
})

}

}

renderChannels(channels)

}

function renderChannels(list){

const box=document.getElementById("channels")

box.innerHTML=""

let max = isActivated ? list.length : LIMIT

for(let i=0;i<Math.min(max,list.length);i++){

const ch=list[i]

const div=document.createElement("div")
div.className="channel"

div.innerHTML=

`<b>${ch.name}</b>
<br>
<a href="${ch.url}" target="_blank">Play</a>`

box.appendChild(div)

}

if(!isActivated && list.length>LIMIT){

const warn=document.createElement("div")

warn.style.marginTop="20px"

warn.innerHTML=
`Trial limit: ${LIMIT} canale
<br>
Activează pentru acces complet.`

box.appendChild(warn)

}

}

async function loadURL(){

const url=document.getElementById("urlInput").value

const res=await fetch(url)

const text=await res.text()

parseM3U(text)

}

function loadDemo(){

fetch("romanesti.m3u")
.then(r=>r.text())
.then(parseM3U)

}

function loadText(){

const text=document.getElementById("textInput").value

parseM3U(text)

}

function loadFile(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){

parseM3U(reader.result)

}

reader.readAsText(file)

}

function goActivate(){

window.location.href="activate.html"

}

function goRequestCode(){

window.location.href="request-code.html"

}

</script>

</body>
</html>
